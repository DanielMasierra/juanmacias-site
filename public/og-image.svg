  <!-- macOS dots -->
  <circle cx="48" cy="48" r="8" fill="#ff5f57"/>
  <circle cx="72" cy="48" r="8" fill="#febc2e"/>
  <circle cx="96" cy="48" r="8" fill="#28c840"/>

  <!-- whoami prompt -->
  <text x="48" y="140" font-family="monospace" font-size="22" fill="#68dbae">&gt; whoami</text>

